[phases.setup]
# yt-dlp disponível como pacote nix — sem necessidade de pip para ele
nixPkgs = ["nodejs", "ffmpeg", "python311", "yt-dlp"]

[phases.install]
cmds = [
  "npm ci",
  "pip3 install --no-cache-dir numpy scipy"
]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "node dist/src/server.js"
